<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .c {
        position: relative;
        width: 100vw;
        height: 100vh;
        border: 1px solid red;
        overflow-y: auto;
        overflow-x: hidden;
      }
      .b {
        position: absolute;
        top: 0;
        left: 0;
        width: 240px;
        height: 100vh;
        background-color: rgba(0, 0, 0, 0.5);
      }
      .d {
        height: 2000px;
      }
    </style>
  </head>
  <body>
    <div class="c">
      <div class="b"></div>
      <div class="d"></div>
    </div>
  </body>
</html>
